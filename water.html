<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Water Quality Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Plotly -->
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">

<style>
:root {
    --bg: #f8fafc;
    --card: rgba(255,255,255,.85);
    --primary: #2563eb;
    --accent: linear-gradient(135deg,#2563eb,#38bdf8);
    --text: #0f172a;
    --muted: #64748b;
    --border: rgba(15,23,42,.08);
    --good:#22c55e;
    --warn:#f59e0b;
    --bad:#ef4444;
}

[data-theme="dark"]{
    --bg:#020617;
    --card:rgba(15,23,42,.85);
    --text:#e5e7eb;
    --muted:#94a3b8;
    --border:rgba(148,163,184,.15);
}

* { box-sizing:border-box; font-family: 'Inter', sans-serif; margin:0; padding:0; }

body { padding:24px; background:var(--bg); color:var(--text); transition:.3s; }

header{
    background:var(--accent);
    border-radius:18px;
    padding:22px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    margin-bottom:26px;
}
.top{
    display:flex; flex-wrap:wrap; gap:20px; align-items:center;
}
h1{ margin:0; font-size:2rem; font-weight:700; flex:1; }
.header-controls{ display:flex; gap:10px; align-items:center; }

select,button{
    padding:10px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    cursor:pointer;
    font-weight:500;
}

button.primary{ background:var(--primary); color:#fff; border:none; }

.timestamp{ margin-top:10px; font-size:.85rem; opacity:.85; }

.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; }

.card{
    backdrop-filter:blur(14px);
    background:var(--card);
    border-radius:18px;
    padding:18px;
    border:1px solid var(--border);
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.25s;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.card:hover{ transform:translateY(-4px); }
.card h3{ margin:0; font-size:.85rem; color:var(--muted); display:flex; justify-content:center; gap:8px; align-items:center; }
.value{ margin-top:10px; font-size:2rem; font-weight:600; color:var(--primary); }
.badge{ padding:2px 8px; border-radius:999px; font-size:.65rem; font-weight:600; }
.good{background:rgba(34,197,94,.15);color:var(--good);}
.warn{background:rgba(245,158,11,.15);color:var(--warn);}
.bad{background:rgba(239,68,68,.15);color:var(--bad);}

.history{ margin-top:34px; background:var(--card); border-radius:20px; padding:22px; border:1px solid var(--border); box-shadow:0 16px 40px rgba(0,0,0,.1); }
.history h2{ margin-top:0; color:var(--primary); font-weight:600; font-size:1.2rem; }

.stats-bar{
    display:flex; flex-wrap:wrap; gap:20px; align-items:center;
    padding:16px 20px; border-radius:20px;
    background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(56,221,248,0.05));
    backdrop-filter: blur(12px);
    margin-bottom:20px;
	background-color: #3498db;
}
.stats-bar label, .stats-bar select, .stats-bar button{ font-weight:600; }
.stats-cards{ display:flex; flex-wrap:wrap; gap:12px; flex:1; justify-content:flex-end; }
.stat-card{
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.85);
    border-radius:16px;
    padding:12px 18px;
    min-width:120px; text-align:center;
    transition:.25s; border:1px solid rgba(15,23,42,.08);
}
.stat-card:hover{ transform:translateY(-4px); box-shadow:0 12px 28px rgba(0,0,0,.12); }
.stat-card h4{ margin:0; font-size:.75rem; color:var(--muted); font-weight:500; }
.stat-card .value{ font-size:1.3rem; font-weight:600; color:var(--primary); }

/* Sensor icon colors */
.sensor-icon { font-size:1.2rem; }
.icon-temperature { color:#FF5722; }
.icon-turbidity { color:#3F51B5; }
.icon-conductivity { color:#009688; }
.icon-pressure { color:#795548; }
.icon-ph { color:#9C27B0; }
.icon-do { color:#03A9F4; }
</style>
</head>

<body>

<header>
    <div class="top">
        <h1><i class="fas fa-water"></i> Water Quality Dashboard</h1>
        <div class="header-controls">
            <button id="themeToggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
            <select id="nodeSelect" aria-label="Select Node"></select>
        </div>
    </div>
    <div class="timestamp" id="timestamp">Loading.</div>
</header>

<section class="grid" id="cardsContainer"></section>

<section class="history">
    <h2><i class="fas fa-chart-line"></i> Historical Trend</h2>
	<br>

    <div class="stats-bar">
        <label> <span style="color:white" >Time Range:</span>
            <select id="rangeSelect" aria-label="Select Time Range">
                <option value="1">Last 1h</option>
                <option value="24">Last 24h</option>
                <option value="168">Last 7d</option>
                <option value="720">Last 30d</option>
                <option value="all">All</option>
            </select>
        </label>

        <select id="sensorSelect" aria-label="Select Sensor">
            <option value="temperature">Temperature</option>
            <option value="turbidity">Turbidity</option>
            <option value="conductivity">Conductivity</option>
            <option value="pressure">Pressure</option>
            <option value="ph">pH</option>
            <option value="do">Dissolved Oxygen</option>
        </select>

        <button id="exportCsv"><i class="fas fa-file-csv"></i> CSV</button>

        <div class="stats-cards" id="statsContainer"></div>
    </div>
	<br>
    
	<div id="historyChart" style="height:420px;"></div>
</section>

<script>
const FIREBASE_URL="https://water-34eff-default-rtdb.firebaseio.com/sensors.json";

const nodeSelect = document.getElementById("nodeSelect");
const sensorSelect = document.getElementById("sensorSelect");
const rangeSelect = document.getElementById("rangeSelect");
const cardsContainer = document.getElementById("cardsContainer");
const timestampEl = document.getElementById("timestamp");
const statsContainer = document.getElementById("statsContainer");

// Map dashboard fields to Firebase structure
const sensorMap = {
 temperature: d => d.physical?.temperature_c,
 turbidity: d => d.physical?.turbidity_ntu,
 conductivity: d => d.physical?.conductivity_us_cm,
 pressure: d => d.physical?.pressure_pa,
 ph: d => d.chemical?.ph,
 do: d => d.chemical?.do_mg_l
};

const labels = {
 temperature:"Temperature (C)",
 turbidity:"Turbidity (NTU)",
 conductivity:"Conductivity (uS/cm)",
 pressure:"Pressure (Pa)",
 ph:"pH",
 do:"Dissolved Oxygen (mg/L)"
};

// Icons for each sensor
const icons = {
 temperature: '<i class="fas fa-thermometer-half sensor-icon icon-temperature"></i>',
 turbidity: '<i class="fas fa-water sensor-icon icon-turbidity"></i>',
 conductivity: '<i class="fas fa-bolt sensor-icon icon-conductivity"></i>',
 pressure: '<i class="fas fa-tachometer-alt sensor-icon icon-pressure"></i>',
 ph: '<i class="fas fa-flask sensor-icon icon-ph"></i>',
 do: '<i class="fas fa-wind sensor-icon icon-do"></i>'
};

const thresholds = {
 temperature:[0,30],
 ph:[6.5,8.5],
 do:[5,Infinity],
 turbidity:[0,5],
 conductivity:[0,200],
 pressure:[9000,12000]
};

function status(key,val){
 const t=thresholds[key];
 if(!t||val==="--") return "good";
 return val<t[0]||val>t[1]?"bad":"good";
}

let plotReady=false;

function computeStats(values){
    const n = values.length;
    if(n===0) return {min:"--",max:"--",avg:"--",std:"--"};
    const sum = values.reduce((a,b)=>a+b,0);
    const avg = sum/n;
    const min = Math.min(...values);
    const max = Math.max(...values);
    const std = Math.sqrt(values.reduce((a,b)=>a+(b-avg)**2,0)/n);
    return {min,max,avg,std};
}

function formatStat(v){ return typeof v==="number" ? v.toFixed(2) : "--"; }

async function load(){
 let data;
 try {
   const r = await fetch(FIREBASE_URL);
   const raw = await r.json();
   data = Object.values(raw);
 } catch {
   data = [{
     node_id: "node_01",
     timestamp: new Date().toISOString(),
     physical: {temperature_c: 2.5, turbidity_ntu: 7.1, conductivity_us_cm: 70, pressure_pa: 11325},
     chemical: {ph:6.2, do_mg_l:9.8}
   }];
 }

 if(!nodeSelect.options.length){
  [...new Set(data.map(d=>d.node_id||"default"))]
   .forEach(n=>nodeSelect.add(new Option(n,n)));
 }

 updateCards(data);
 updateStats(data);
 updateChart(data);
}

function updateCards(data){
 const node = nodeSelect.value;
 const latest = data.filter(d => (d.node_id||"default") === node)
    .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
 if(!latest) return;

 timestampEl.textContent = "Last update: " + new Date(latest.timestamp).toLocaleString();
 cardsContainer.innerHTML = "";

 for(const k in sensorMap){
  const v = sensorMap[k](latest) ?? "--";
  const s = status(k,v);
  cardsContainer.innerHTML += `
   <div class="card">
    <h3>${icons[k]} ${labels[k]} <span class="badge ${s}">${s}</span></h3>
    <div class="value">${v}</div>
   </div>`;
 }
}

function updateStats(data){
 const node = nodeSelect.value;
 const sensor = sensorSelect.value;
 const range = rangeSelect.value;
 const now = Date.now();

 const filtered = data
   .filter(d => (d.node_id||"default") === node)
   .filter(d=> range==="all" || now - new Date(d.timestamp) < range*3600*1000)
   .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));

 const values = filtered.map(d=>sensorMap[sensor](d)).filter(v=>v!==null && v!==undefined);
 const stats = computeStats(values);

 statsContainer.innerHTML = `
   <div class="stat-card"><h4>Min</h4><div class="value">${formatStat(stats.min)}</div></div>
   <div class="stat-card"><h4>Max</h4><div class="value">${formatStat(stats.max)}</div></div>
   <div class="stat-card"><h4>Average</h4><div class="value">${formatStat(stats.avg)}</div></div>
   <div class="stat-card"><h4>Std Dev</h4><div class="value">${formatStat(stats.std)}</div></div>
 `;
}

function updateChart(data){
 const node = nodeSelect.value;
 const sensor = sensorSelect.value;
 const range = rangeSelect.value;
 const now = Date.now();

 const filtered = data
   .filter(d => (d.node_id||"default") === node)
   .filter(d=> range==="all" || now - new Date(d.timestamp) < range*3600*1000)
   .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));

 const trace = {
  x: filtered.map(d => new Date(d.timestamp)),
  y: filtered.map(d => sensorMap[sensor](d)),
  type:"scatter",
  mode:"lines+markers",
  line:{color:"#2563eb",width:2},
  marker:{size:4},
  hovertemplate:"%{x}<br><b>%{y}</b><extra></extra>"
 };

 const layout = {
  margin:{t:20,r:20,b:40,l:50},
  paper_bgcolor:"rgba(0,0,0,0)",
  plot_bgcolor:"rgba(0,0,0,0)",
  xaxis:{type:"date",rangeslider:{visible:true}},
  yaxis:{title:labels[sensor]}
 };

 const config = {responsive:true,scrollZoom:true,displaylogo:false};

 if(!plotReady){
  Plotly.newPlot("historyChart",[trace],layout,config);
  plotReady=true;
 } else {
  Plotly.react("historyChart",[trace],layout,config);
 }
}

// Theme toggle
document.getElementById("themeToggle").onclick = () => {
 document.body.dataset.theme = document.body.dataset.theme ? "" : "dark";
};

// CSV download
document.getElementById("exportCsv").onclick = () => {
 const node = nodeSelect.value;
 const sensor = sensorSelect.value;
 const gd = document.getElementById("historyChart");
 if(!gd.data.length) return;
 const pts = gd.data[0];
 let csv = "time,value\n";
 pts.x.forEach((t,i)=>{
    csv += `${new Date(t).toISOString()},${pts.y[i]}\n`;
 });
 const blob = new Blob([csv], {type:"text/csv"});
 const a = document.createElement("a");
 a.href = window.URL.createObjectURL(blob);
 a.download = `${node}_${sensor}_timeseries.csv`;
 a.click();
};

nodeSelect.onchange = sensorSelect.onchange = rangeSelect.onchange = load;

load();
setInterval(load,5000);
</script>
</body>
</html>
